<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemgala</title><style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #b2fefa, #0ed2a7);
    text-align: center;
    color: #222;
}

.container {
    padding: 25px 15px;
    max-width: 420px;
    margin: auto;
}

.logo {
    width: 100px;
    height: 100px;
    border-radius: 25px;
    margin-bottom: 15px;
}

h1 {
    font-size: 32px;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 16px;
    margin-bottom: 20px;
}

.card {
    background: linear-gradient(135deg, #00c9a7, #00b894);
    padding: 10px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    margin-bottom: 25px;
}

.video-box {
    border-radius: 15px;
    overflow: hidden;
}

video {
    width: 100%;
    display: block;
}

.btn {
    display: block;
    padding: 16px;
    background: linear-gradient(90deg, #00c9a7, #00b894);
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    opacity: 0.85;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.7;
}
</style></head><body><div class="container"><!-- Logo (file lokal) -->
<img src="logo.png" class="logo" alt="Gemgala Logo">

<!-- Title -->
<h1>Gemgala</h1>
<div class="subtitle">Play games win rewards</div>

<!-- Video (file lokal) -->
<div class="card">
    <div class="video-box">
        <video autoplay muted loop controls>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>
</div>

<!-- Button -->
<a href="https://getblock.me/u/26585337" class="btn">
    Download Sekarang
</a>

<div class="footer">
    © 2026 Gemgala
</div>

</div></body>
</html>
